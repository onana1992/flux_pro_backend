spring.application.name=flux-pro-backend
server.port=8080

# --- MySQL (local) ---
spring.datasource.url=jdbc:mysql://localhost:3306/fluxpro?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=core
spring.datasource.password=core2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- JWT ---
fluxpro.jwt.secret=FluxProMINTPDevSecretKey2025MustBeAtLeast256BitsLongForHS256Algorithm!!
fluxpro.jwt.access-expiration-ms=28800000
fluxpro.jwt.refresh-expiration-ms=604800000

# --- CORS ---
fluxpro.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001

# --- Swagger / OpenAPI (springdoc) ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=false
