spring.application.name=flux-pro-backend
server.port=8080

# --- i18n (messages d'erreur/succès traduits selon Accept-Language, cf. LocaleConfig) ---
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.messages.always-use-message-format=false
spring.messages.use-code-as-default-message=true

# --- MySQL (local) ---
spring.datasource.url=jdbc:mysql://localhost:3306/fluxpro?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=core
spring.datasource.password=core2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# --- JWT ---
fluxpro.jwt.secret=FluxProMINTPDevSecretKey2025MustBeAtLeast256BitsLongForHS256Algorithm!!
fluxpro.jwt.access-expiration-ms=28800000
fluxpro.jwt.refresh-expiration-ms=604800000

# --- CORS ---
fluxpro.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001

# --- Swagger / OpenAPI (springdoc) ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.show-actuator=false

# --- Pièces jointes (stockage local ; MinIO en production) ---
fluxpro.attachments.storage-path=./data/attachments
spring.servlet.multipart.max-file-size=21MB
spring.servlet.multipart.max-request-size=22MB

# --- Horloge système (mode test : artificial clock en DB, tick réel) ---
# normal = Instant.now() réel | test = horloge stockée (docs/sql/2026-07-14_system_clock.sql)
# Profil Spring alternatif : --spring.profiles.active=test (cf. application-test.properties)
fluxpro.clock.mode=${FLUXPRO_CLOCK_MODE:test}
# Poll mur pour détecter les créneaux cron franchis par l'horloge (réelle ou simulée)
fluxpro.clock.job-poll-ms=5000

# --- Alertes et escalade (ALR) ---
# SMTP (laisser vide en dev : l'envoi échoue silencieusement, l'alerte est journalisée FAILED)
spring.mail.host=${MINTP_SMTP_HOST:}
spring.mail.port=${MINTP_SMTP_PORT:587}
spring.mail.username=${MINTP_SMTP_USER:}
spring.mail.password=${MINTP_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
fluxpro.alerts.from-address=${FLUXPRO_ALERTS_FROM:alertes@mintp.cm}
# Fréquence d'évaluation du moteur d'alertes (ALR-01 à ALR-04)
fluxpro.alerts.scheduler.cron=0 0/30 7-18 * * MON-FRI
# Récapitulatif quotidien des retards (ALR-08) — 7h30, lun-ven
fluxpro.alerts.digest.cron=0 30 7 * * MON-FRI
# Rôle destinataire du digest — n'importe quelle valeur de UserRole, pas figée dans le code
fluxpro.alerts.digest.target-role=DIRECTOR
